version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

    cooldown:
      default-days: 7
      exclude:
        - github.com/einride/*
        - github.com/einride-autonomous/*
        - github.com/einride-labs/*
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    groups:
      opentelemetry:
        patterns: ["*opentelemetry*"]
      all:
        patterns: ["*"]
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - github.com/einride/*
        - github.com/einride-autonomous/*
        - github.com/einride-labs/*
  - package-ecosystem: gomod
    directory: .sage
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - github.com/einride/*
        - github.com/einride-autonomous/*
        - github.com/einride-labs/*
